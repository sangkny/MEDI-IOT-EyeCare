[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short
log_cli = false
markers =
    unit: 단위 테스트 (GHA 실행 가능 — DB/Redis/uvicorn/ONNX/LLM 불필요)
    integration: 통합 테스트 (로컬 Docker 스택)
    requires_db: PostgreSQL 필요 (로컬만)
    requires_llm: LM Studio / LLM API 필요 (로컬만)
    requires_onnx: ONNX/torch 모델 파일 필요 (로컬만)
    slow: 장시간 실행 (LM Studio VISION 등, CI에서 -m "not slow" 로 제외)
    requires_lm_studio: LM Studio /v1/models 가동 필요 (미가동 시 skip)

[coverage:run]
omit =
    tests/*
    alembic/*
    docs/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if __name__ == .__main__.:
