name: ontology-check

on:
  pull_request:
    paths:
      - "**.py"

permissions:
  contents: read

jobs:
  medical-oracle:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/shared-libraries

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: shared-libraries
        run: |
          git clone --depth 1 https://github.com/sangkny/shared-libraries.git shared-libraries
          pip install -q -r shared-libraries/requirements.txt
          pip install -q -e ./shared-libraries

      - name: Missing required field (의료 스키마 회귀 방지)
        run: |
          pytest shared-libraries/ontology/tests/test_validator.py::TestMedicalValidator::test_missing_required_field -q
