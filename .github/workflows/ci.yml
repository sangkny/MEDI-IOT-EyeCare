name: CI (Unit Tests)

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: ${{ github.workspace }}/shared-libraries:${{ github.workspace }}
      MEDI_STRIPE_ENABLED: "0"
      MEDI_STRIPE_SKIP_SIG_VERIFY: "1"
      LLM_PROVIDER: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: shared-libraries
        run: |
          rm -rf shared-libraries
          git clone --depth 1 https://github.com/sangkny/shared-libraries.git shared-libraries
          pip install --upgrade pip
          pip install -r shared-libraries/requirements.txt
          pip install -e ./shared-libraries

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-timeout
          pip install -r requirements.txt

      - name: Ontology smoke (unit)
        run: |
          pytest shared-libraries/ontology/tests/test_validator.py::TestMedicalValidator::test_valid_patient_passes -q

      - name: Run unit tests only
        run: |
          sed -i 's/\r$//' scripts/ci-pytest.sh
          bash scripts/ci-pytest.sh
