<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEDI Video DR Lab — 안저 영상 DR(CNN)</title>
  <style>
    :root { --bg:#0f1419; --card:#1a2332; --accent:#22c55e; --text:#e7ecf3; --muted:#94a3b8; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 1.5rem; max-width: 900px; }
    h1 { font-size: 1.35rem; margin: 0 0 0.25rem; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    .card { background: var(--card); border-radius: 10px; padding: 1rem 1.25rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin: 0.6rem 0 0.25rem; }
    input[type=file] { width: 100%; padding: 0.35rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: var(--text); }
    input[type=number] { width: 8rem; padding: 0.5rem; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: var(--text); }
    button { margin-top: 1rem; background: var(--accent); color: #0f172a; border: none; padding: 0.65rem 1.2rem; border-radius: 8px; cursor: pointer; font-weight: 700; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    pre { background: #0f172a; padding: 0.75rem; border-radius: 8px; overflow: auto; font-size: 0.75rem; max-height: 480px; white-space: pre-wrap; }
    a { color: #60a5fa; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h1>MEDI Video DR Lab</h1>
  <p class="sub">
    mp4 / webm 업로드 → 균등 샘플 프레임(기본 최대 8장) → 각 프레임 <strong>CNN DR</strong> 추론 → <strong>최대 DR 등급</strong>으로 집계.
    <br />CNN 모델(<code>models/*.onnx</code>)이 컨테이너에 있어야 합니다.
  </p>
  <p class="sub"><a href="/api/v1/lab/fundus">← Fundus 이미지 Lab</a></p>

  <div class="card">
    <form id="form">
      <label>영상 파일</label>
      <input type="file" id="file" accept=".mp4,.webm,video/mp4,video/webm" required />

      <label>최대 프레임 수 (1–24)</label>
      <input type="number" id="max_frames" value="8" min="1" max="24" />

      <button type="submit" id="btn">DR 분석 실행</button>
    </form>
    <p id="msg" class="err" style="margin-top:0.75rem"></p>
    <pre id="out"></pre>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('btn');
    const out = document.getElementById('out');
    const msg = document.getElementById('msg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      out.textContent = '';
      const f = document.getElementById('file').files[0];
      if (!f) { msg.textContent = '파일을 선택하세요.'; return; }
      const maxFrames = parseInt(document.getElementById('max_frames').value, 10) || 8;
      const fd = new FormData();
      fd.append('file', f);
      fd.append('max_frames', String(Math.min(24, Math.max(1, maxFrames))));
      btn.disabled = true;
      try {
        const r = await fetch('/api/v1/lab/video-dr/analyze', { method: 'POST', body: fd });
        const text = await r.text();
        let j;
        try { j = JSON.parse(text); } catch { j = { raw: text }; }
        if (!r.ok) {
          msg.textContent = (j && j.detail) ? (typeof j.detail === 'string' ? j.detail : JSON.stringify(j.detail)) : text;
          return;
        }
        out.textContent = JSON.stringify(j, null, 2);
      } catch (err) {
        msg.textContent = String(err);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
